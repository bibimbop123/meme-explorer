name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: meme_explorer_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v3

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: 3.2.1
        bundler-cache: true

    - name: Install dependencies
      run: bundle install

    - name: Set up database
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/meme_explorer_test
        REDIS_URL: redis://localhost:6379/0
        RACK_ENV: test
      run: |
        bundle exec ruby scripts/setup_database.rb

    - name: Run tests
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/meme_explorer_test
        REDIS_URL: redis://localhost:6379/0
        RACK_ENV: test
      run: |
        bundle exec rspec --format documentation

    - name: Upload coverage
      uses: codecov/codecov-action@v3
      if: success()
      with:
        files: ./coverage/coverage.xml
        flags: unittests
        name: codecov-umbrella

  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: 3.2.1
        bundler-cache: true

    - name: Run RuboCop
      run: bundle exec rubocop

  security:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: 3.2.1
        bundler-cache: true

    - name: Install bundler-audit
      run: gem install bundler-audit

    - name: Run security audit
      run: bundle audit check --update
