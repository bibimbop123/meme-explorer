services:
  - type: web
    name: meme-explorer
    runtime: ruby
    region: oregon
    plan: free
    buildCommand: bundle install
    startCommand: bundle exec rackup config.ru -p $PORT
    envVars:
      - key: RACK_ENV
        value: production
      - key: PORT
        value: 3000
      - key: BUNDLE_WITHOUT
        value: development:test
      - key: REDDIT_CLIENT_ID
        value: ${REDDIT_CLIENT_ID}
      - key: REDDIT_CLIENT_SECRET
        value: ${REDDIT_CLIENT_SECRET}
      - key: REDIS_URL
        fromService:
          type: redis
          name: meme-explorer-redis
          property: connectionString
      - key: SIDEKIQ_USERNAME
        generateValue: true
      - key: SIDEKIQ_PASSWORD
        generateValue: true
  
  # Sidekiq Worker Service (P2 Week 3: Background Jobs)
  - type: worker
    name: meme-explorer-worker
    runtime: ruby
    region: oregon
    plan: free
    buildCommand: bundle install
    startCommand: bundle exec sidekiq -C config/sidekiq.yml
    envVars:
      - key: RACK_ENV
        value: production
      - key: BUNDLE_WITHOUT
        value: development:test
      - key: REDDIT_CLIENT_ID
        value: ${REDDIT_CLIENT_ID}
      - key: REDDIT_CLIENT_SECRET
        value: ${REDDIT_CLIENT_SECRET}
      - key: REDIS_URL
        fromService:
          type: redis
          name: meme-explorer-redis
          property: connectionString
  
  # Redis Service (Required for Sidekiq)
  - type: redis
    name: meme-explorer-redis
    region: oregon
    plan: free
    maxmemoryPolicy: allkeys-lru
