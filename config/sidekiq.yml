---
:concurrency: 5
:timeout: 25
:queues:
  - critical
  - default
  - low

# Scheduled jobs configuration
:schedule:
  cache_preload:
    cron: '@reboot'  # Run on application startup
    class: CachePreloadWorker
    description: 'Warm cache with memes on startup'
  cache_refresh:
    cron: '*/10 * * * *'  # PHASE 1: Every 10 minutes (increased from 30 for 2000+ pool)
    class: CacheRefreshWorker
    queue: default
    description: "Refresh meme cache from Reddit API"
    
  similar_meme_prefetch:
    cron: '*/10 * * * *'  # PHASE 1: Every 10 minutes for instant "More Like This"
    class: SimilarMemePrefetchWorker
    queue: default
    description: "Prefetch similar memes for popular subreddits (<100ms response)"
    
  meme_pool_maintenance:
    cron: '*/5 * * * *'  # PHASE 2: Every 5 minutes to maintain 5,000-meme pool
    class: MemePoolMaintenanceWorker
    queue: default
    description: "Intelligent pool management with tier-based distribution"
    
  subreddit_discovery:
    cron: '0 0 * * 0'  # PHASE 2: Weekly on Sunday at midnight
    class: SubredditDiscoveryWorker
    queue: low
    description: "Auto-discover new quality subreddits (50+ per week)"
    
  image_health_check:
    cron: '*/30 * * * *'  # Every 30 minutes (proactive validation)
    class: ImageHealthWorker
    queue: low_priority
    description: "Proactively validate cached meme URLs and remove broken content"
    
  leaderboard_update:
    cron: '0 * * * *'  # Every hour
    class: LeaderboardCalculationWorker
    queue: critical
    description: "Calculate leaderboard scores for all users"
    
  database_cleanup:
    cron: '0 * * * *'  # Every hour (recommended for production stability)
    class: DatabaseCleanupWorker
    queue: low
    description: "Remove old broken images and stale data"
    
  activity_aggregation:
    cron: '*/5 * * * *'  # Every 5 minutes
    class: ActivityAggregationWorker
    queue: default
    description: "Aggregate visitor activity stats"
    
  session_cleanup:
    cron: '*/5 * * * *'  # Every 5 minutes
    class: SessionCleanupWorker
    queue: default
    description: "Cleanup expired and zombie sessions"

production:
  :concurrency: 10

development:
  :concurrency: 2
